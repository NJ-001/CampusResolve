<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Profile - CampusResolve</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --primary:#E8521A; --primary-light:#FF6B35; --accent:#1A1A2E; --surface:#fff; --surface-2:#F8F7F4; --border:#E4E2DC; --text:#1A1A1A; --text-2:#5A5A6A; --text-3:#9A9AAA; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'DM Sans',sans-serif; background:var(--surface-2); color:var(--text); min-height:100vh; }
  h1,h2,h3 { font-family:'Syne',sans-serif; }
  .topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:16px 24px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
  .brand { display:flex; align-items:center; gap:10px; text-decoration:none; color:inherit; }
  .brand-icon { width:38px; height:38px; border-radius:10px; background:linear-gradient(135deg,var(--primary),var(--primary-light)); color:#fff; display:flex; align-items:center; justify-content:center; font-size:18px; }
  .container { width:100%; margin:0 auto; padding:32px clamp(18px, 3vw, 40px) 56px; }
  .hero { display:grid; grid-template-columns:180px 1fr; gap:24px; align-items:center; margin-bottom:24px; }
  .avatar { width:160px; height:160px; border-radius:32px; background:linear-gradient(135deg,var(--primary),var(--primary-light)); color:#fff; display:flex; align-items:center; justify-content:center; font-size:56px; font-family:'Syne',sans-serif; font-weight:800; }
  .hero-card, .detail-card { background:var(--surface); border:1.5px solid var(--border); border-radius:18px; box-shadow:0 8px 24px rgba(0,0,0,0.04); }
  .hero-card { padding:28px; }
  .hero-sub { color:var(--text-3); font-size:14px; margin-top:6px; }
  .badge { display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:999px; background:rgba(232,82,26,0.1); color:var(--primary); font-size:12px; font-weight:700; margin-top:14px; }
  .actions { display:flex; gap:10px; margin-top:18px; }
  .btn-primary, .btn-ghost { border-radius:10px; padding:10px 16px; font-size:14px; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; text-decoration:none; }
  .btn-primary { background:linear-gradient(135deg,var(--primary),var(--primary-light)); color:#fff; border:none; }
  .btn-ghost { background:none; color:var(--text-2); border:1.5px solid var(--border); }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
  .detail-card { padding:22px; }
  .detail-title { font-size:12px; text-transform:uppercase; letter-spacing:.8px; color:var(--text-3); font-weight:700; margin-bottom:14px; }
  .detail-row { display:flex; justify-content:space-between; gap:16px; padding:10px 0; border-bottom:1px solid var(--border); }
  .detail-row:last-child { border-bottom:none; }
  .label { color:var(--text-3); font-size:13px; }
  .value { color:var(--text); font-size:14px; font-weight:600; text-align:right; }
  @media (max-width: 900px) {
    .container { padding:24px 18px 40px; }
    .hero { grid-template-columns:140px 1fr; gap:18px; }
    .avatar { width:132px; height:132px; border-radius:28px; font-size:46px; }
  }
  @media (max-width: 700px) {
    .hero { grid-template-columns:1fr; }
    .grid { grid-template-columns:1fr; }
    .avatar { width:110px; height:110px; border-radius:24px; font-size:40px; }
    .hero-card, .detail-card { padding:18px; }
    .actions { flex-direction:column; }
    .btn-primary, .btn-ghost { width:100%; text-align:center; }
  }
</style>
</head>
<body>
<div class="topbar">
  <a class="brand" href="index.html">
    <div class="brand-icon">🏫</div>
    <div>
      <h1 style="font-size:17px;">CampusResolve</h1>
      <div style="font-size:12px;color:var(--text-3);">Profile overview</div>
    </div>
  </a>
  <a class="btn-ghost" href="index.html">Back to Feed</a>
</div>

<div class="container">
  <div class="hero">
    <div class="avatar" id="profileAvatar">U</div>
    <div class="hero-card">
      <h2 id="profileName">User</h2>
      <div class="hero-sub" id="profileEmail">email@example.com</div>
      <div class="badge" id="profileRole">Student</div>
      <div class="actions">
        <a class="btn-primary" href="profile-setup.html">Edit Profile</a>
        <button class="btn-ghost" onclick="CR.logout()">Logout</button>
      </div>
    </div>
  </div>

  <div class="grid">
    <div class="detail-card">
      <div class="detail-title">Contact</div>
      <div class="detail-row"><div class="label">Mobile</div><div class="value" id="detailMobile">-</div></div>
      <div class="detail-row"><div class="label">Department</div><div class="value" id="detailDepartment">-</div></div>
      <div class="detail-row"><div class="label">College ID</div><div class="value" id="detailCollegeId">-</div></div>
      <div class="detail-row"><div class="label">Verified</div><div class="value" id="detailVerified">Yes</div></div>
    </div>
    <div class="detail-card">
      <div class="detail-title">Academic</div>
      <div class="detail-row"><div class="label">Branch</div><div class="value" id="detailBranch">-</div></div>
      <div class="detail-row"><div class="label">Year</div><div class="value" id="detailYear">-</div></div>
      <div class="detail-row"><div class="label">Division</div><div class="value" id="detailDivision">-</div></div>
      <div class="detail-row"><div class="label">Roll No.</div><div class="value" id="detailRollNo">-</div></div>
    </div>
  </div>
</div>

<script src="js/auth-guard.js"></script>
<script>
  CR.requireProfile();
  const user = CR.getSession();
  if (user) {
    document.getElementById('profileAvatar').textContent = (user.name || user.email || 'U').charAt(0).toUpperCase();
    document.getElementById('profileName').textContent = user.name || 'Student';
    document.getElementById('profileEmail').textContent = user.email || '';
    document.getElementById('profileRole').textContent = (user.role || 'student').replace('_', ' ').toUpperCase();
    document.getElementById('detailMobile').textContent = user.mobile || '-';
    document.getElementById('detailDepartment').textContent = user.department || '-';
    document.getElementById('detailCollegeId').textContent = user.collegeId || '-';
    document.getElementById('detailVerified').textContent = user.verified ? 'Yes' : 'No';
    document.getElementById('detailBranch').textContent = user.branch || '-';
    document.getElementById('detailYear').textContent = user.year || '-';
    document.getElementById('detailDivision').textContent = user.division || '-';
    document.getElementById('detailRollNo').textContent = user.rollNo || '-';
  }
</script>
</body>
</html>
